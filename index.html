<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>
</head>
<body style="text-align:center; margin-top:50px;">

    <h1 style="color: aquamarine">Sentiment Analysis</h1>

    <form method="POST">
        <textarea name="text" rows="5" cols="40"
        placeholder="Enter text here..."></textarea><br><br>
        <button type="submit">Analyze</button>
    </form>

    {% if sentiment %}
        <h3>{{ sentiment }}</h3>
        <p>Polarity: {{ polarity }}</p>
        <p>Subjectivity: {{ subjectivity }}</p>
    {% endif %}

</body>
</html>
